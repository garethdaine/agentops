name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          echo "::group::Shellcheck warnings (non-blocking)"
          shellcheck -x -e SC1091 -S warning hooks/*.sh || true
          echo "::endgroup::"
          echo "Running error-level check..."
          shellcheck -x -e SC1091 -S error hooks/*.sh
